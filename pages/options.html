<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>白名单与设置</title>
    <link rel="stylesheet" href="../assets/styles/common.css" />
  </head>
  <body class="options-page">
    <main class="page-shell stack">
      <section class="hero">
        <div>
          <div class="kicker">Whitelist & Settings</div>
          <h1>白名单与设置</h1>
          <p>在开始专注前，先准备你的学习站点和约束参数。专注期间此页面会自动切换为只读。</p>
        </div>
      </section>

      <section id="lockBanner" class="lock-banner hidden"></section>
      <section id="optionsNotice" class="notice hidden"></section>

      <section class="card stack">
        <div class="section-tabs">
          <button id="whitelistTabButton" class="tab-button active" type="button">白名单</button>
          <button id="settingsTabButton" class="tab-button" type="button">设置</button>
        </div>

        <section id="whitelistPanel" class="section-panel">
          <div class="field">
            <label for="searchInput">搜索域名</label>
            <input id="searchInput" class="input" type="text" placeholder="搜索白名单" />
          </div>

          <div class="row">
            <div class="field">
              <label for="domainInput">新增域名</label>
              <input id="domainInput" class="input" type="text" placeholder="例如 wikipedia.org" />
            </div>
            <div class="field" style="max-width: 180px;">
              <span class="label">包含子域名</span>
              <label class="notice" style="display: flex; align-items: center; gap: 10px; min-height: 54px;">
                <input id="includeSubdomainsInput" type="checkbox" checked />
                <span>允许子域名</span>
              </label>
            </div>
          </div>

          <div class="inline-actions">
            <button id="addDomainButton" class="button secondary" type="button">添加域名</button>
          </div>

          <div class="field">
            <span class="label">预设学习站点</span>
            <div id="presetContainer" class="chip-row"></div>
          </div>

          <div id="whitelistList" class="list"></div>

          <div class="inline-actions">
            <button id="saveWhitelistButton" class="button">保存白名单</button>
          </div>
        </section>

        <section id="settingsPanel" class="section-panel hidden stack">
          <div class="field">
            <label for="durationCapSelect">自定义时长上限</label>
            <select id="durationCapSelect" class="select"></select>
          </div>

          <div class="notice">统计数据固定保留最近 7 天，超过一周会自动清理。</div>

          <div class="field">
            <span class="label">答题失败冷却</span>
            <label class="notice" style="display: flex; align-items: center; gap: 10px; min-height: 54px;">
              <input id="cooldownEnabledInput" type="checkbox" />
              <span>启用冷却时间</span>
            </label>
          </div>

          <div class="field">
            <label for="cooldownMinutesInput">冷却时间（分钟）</label>
            <input id="cooldownMinutesInput" class="input" type="number" min="1" step="1" />
          </div>

          <div class="field">
            <span class="label">主题</span>
            <div id="themeContainer" class="chip-row"></div>
          </div>

          <div class="inline-actions">
            <button id="saveSettingsButton" class="button">保存设置</button>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
