<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据汇总</title>
    <link rel="stylesheet" href="../assets/styles/common.css" />
  </head>
  <body class="dashboard-page">
    <main class="page-shell stack">
      <section class="hero">
        <div>
          <div class="kicker">Dashboard</div>
          <h1>专注数据汇总</h1>
          <p>这里展示最近 7 天内的会话、拦截、应急解锁和开发阶段错误日志，帮助你回看自己的专注状态。解锁记录仅显示结果与得分。</p>
        </div>
      </section>

      <section id="dashboardNotice" class="notice hidden"></section>

      <section class="card stack">
        <div id="rangeButtons" class="filter-row"></div>
        <div class="metric-grid">
          <div class="metric">
            <span class="label">专注总时长</span>
            <strong id="focusMinutesText">0 分钟</strong>
          </div>
          <div class="metric">
            <span class="label">完成会话数</span>
            <strong id="completedSessionsText">0</strong>
          </div>
          <div class="metric">
            <span class="label">被拦截次数</span>
            <strong id="blockedCountText">0</strong>
          </div>
          <div class="metric">
            <span class="label">解锁次数</span>
            <strong id="unlockCountText">0</strong>
          </div>
        </div>
      </section>

      <section class="card stack">
        <div class="section-heading">
          <div>
            <h2>最近 7 天被拦截域名分布</h2>
            <p class="meta-text">仅保留最近 7 天的拦截记录，超过一周会自动清理。</p>
          </div>
        </div>
        <div id="topBlockedList" class="blocked-chart-shell"></div>
      </section>

      <section class="card stack">
        <h2>学习会话记录</h2>
        <div id="sessionHistoryList" class="list"></div>
      </section>

      <section class="card stack">
        <h2>应急解锁记录</h2>
        <div id="unlockHistoryList" class="list"></div>
      </section>

      <section id="errorLogSection" class="card stack hidden">
        <div style="display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap;">
          <div>
            <h2>错误日志</h2>
            <p class="meta-text">仅在开发调试阶段显示，用于查看最近的异常信息。</p>
          </div>
          <button id="clearErrorLogsButton" class="button ghost" type="button">清空错误日志</button>
        </div>
        <div id="errorLogList" class="list"></div>
      </section>
    </main>

    <script type="module" src="dashboard.js"></script>
  </body>
</html>
