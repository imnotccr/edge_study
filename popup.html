<!doctype html>
<html lang="zh-CN" class="popup-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习专注护栏</title>
    <link rel="stylesheet" href="assets/styles/common.css" />
    <link rel="stylesheet" href="assets/styles/popup.css" />
  </head>
  <body class="popup-body">
    <main class="popup-shell stack">
      <section class="hero">
        <div>
          <div class="brand-banner">
            <span class="brand-mark" aria-hidden="true">
              <span class="brand-mark-glyph">专</span>
            </span>
            <span class="brand-copy">
              <span class="brand-label">学习专注护栏</span>
              <span class="brand-meta">白名单学习模式</span>
            </span>
          </div>
          <h1>当前专注状态</h1>
          <p id="popupHint">加载中...</p>
        </div>
      </section>

      <section class="card">
        <div id="statusBadge" class="status-badge">未开始</div>
        <div class="metric-grid">
          <div class="metric">
            <span class="label">学习目的</span>
            <strong id="purposeText">暂无</strong>
          </div>
          <div class="metric">
            <span class="label">剩余时间</span>
            <strong id="remainingText" class="mono">--:--</strong>
          </div>
          <div class="metric">
            <span class="label">预计结束</span>
            <strong id="endAtText" class="mono">--:--</strong>
          </div>
          <div class="metric">
            <span class="label">白名单数量</span>
            <strong id="whitelistCountText">0</strong>
          </div>
        </div>
      </section>

      <section class="card stack">
        <div class="button-grid">
          <button id="startButton" class="button">开始专注</button>
          <button id="unlockButton" class="button secondary">应急解锁</button>
          <button id="optionsButton" class="button secondary">白名单与设置</button>
          <button id="dashboardButton" class="button secondary">数据汇总</button>
        </div>
      </section>

      <section id="debugCard" class="debug-strip hidden">
        <div>
          <div class="kicker">开发模式</div>
          <p class="meta-text">测试时可快速结束当前专注。</p>
        </div>
        <button id="debugExitButton" class="button ghost">快速退出</button>
      </section>

      <p id="popupMessage" class="inline-note"></p>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
